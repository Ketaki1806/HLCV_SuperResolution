# Conda environment for super-resolution benchmark on conduit HPC.
# Create on login node: conda env create -f environment.yml
# Activate with: conda activate super_resolution

name: super_resolution
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0
  - torchvision>=0.15
  - pytorch-cuda=12.1
  - pillow>=10.0
  - pip
  - pip:
      - pyyaml>=6.0
      - tqdm>=4.65
      - pytest>=7.0
      - timm>=0.9.0
      - ultralytics>=8.0.0
      - opencv-python>=4.8.0
      - numpy>=1.24.0
      - matplotlib>=3.7.0
      - pycocotools>=2.0.6
      - transformers>=4.36.0
      - accelerate>=0.25.0
      - huggingface_hub>=0.20.0
      - transformers>=4.35.0
      - pycocotools>=2.0.7
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
